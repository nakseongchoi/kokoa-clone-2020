<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friends - Kokoa Clone</title>
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"
          />
        </svg>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-full fa-lg"></i>
        <i class="fas fa-bolt"></i>
      </div>
    </div>
    <header class="screen-header">
        <h1 class="screen-header__title">Friends</h1>
        <div class="screen-header__icons">
            <span><i class="fa-solid fa-magnifying-glass fa-lg"></i></span>
            <span><i class="fa-solid fa-music fa-lg"></i></span>
            <span><a href="settings.html"><i class="fa-solid fa-gear fa-lg"></i></a></span>
        </div>
    </header>

    <a id="friends-display-link">
        <i class="fa-solid fa-circle-info"></i>
        Friends' Names Display
        <i class="fa-solid fa-chevron-right fa-xs"></i>
    </a>
    <main class="friends-screen">
    <div class="user-component">
        <div class="user-component__column">
            <img src="https://avatars.githubusercontent.com/u/39376842?s=40&v=4" class="user-component__avatar--xl">
            <div class="user-component__text">
                <h4 class="user-component__title" >Nicolas</h4>
                <!-- <h6 class="user-component__subtitle">this text whatever</h6> -->
            </div>
        </div>
        <div class="user-component__column"></div>
    </div>
    <div class="friends-screen__channel">
        <div class="friends-screen__channel-header">
            <span>Channel</span>
            <i class="fa-solid fa-chevron-up fa-xs"></i>
        </div>
        <div class="user-component">
            <div class="user-component__column">
                    <img src="https://avatars.githubusercontent.com/u/39376842?s=40&v=4" class="user-component__avatar--sm">
                    <div class="user-component__text">
                        <h4 class="user-component__title" >Nicolas</h4>
                        <!-- <h6 class="user-component__subtitle">this text whatever</h6> -->
                    </div>
            </div>
            <div class="user-component__column">
              <div>
                    <span>2</span>
                    <i class="fa-solid fa-chevron-right fa-xs"></i> 
                  </div>
            </div>
        </div>        
    </div>
    </main>

    <!-- nav>ul>li*4>a -->
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="fa-solid fa-user fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="chats.html">
            <span class="nav__notification badge">1</span><i class="fa-regular fa-comment fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="more.html">
            <span class="nav__new"></span><i class="fa-solid fa-ellipsis fa-2xl"></i></a></li>
      </ul>
    </nav>

    <div id="splash-screen">
      <i class="fa-solid fa-comment fa-2xl"></i>
    </div>

    <div id="no-mobile">
      <span>Your Screen is too big</span>
    </div>



    <script
      src="https://kit.fontawesome.com/2f67cf591d.js"
      crossorigin="anonymous"
    ></script>
    <!-- Script should be put in the last of the body  -->
  </body>
</html>
