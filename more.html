<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>More - Kokoa Clone</title>
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"
          />
        </svg>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>11%</span>
        <i class="fas fa-battery-full fa-lg"></i>
        <i class="fas fa-bolt"></i>
      </div>
    </div>
    <header class="screen-header">
        <h1 class="screen-header__title">More</h1>
        <div class="screen-header__icons">
            <span><i class="fa-solid fa-magnifying-glass fa-lg"></i></span>
            <span><i class="fa-solid fa-music fa-lg"></i></span>
            <span>
                <a href="settings.html">
                <i class="fa-solid fa-gear fa-lg"></i></a>
                <span class="screen-header__new"></span>
            </span>
        </div>
    </header>

    <main class="main-screen">
    <div class="user-component">
        <div class="user-component__column">
            <img src="https://media-cldnry.s-nbcnews.com/image/upload/t_fit-1500w,f_auto,q_auto:best/rockcms/2024-03/240325-donald-trump-se-348p-48d6a0.jpg" class="user-component__avatar--xl">
            <div class="user-component__text">
                <h4 class="user-component__title" >Trump</h4>
                <h6 class="user-component__subtitle">Make America Great Again                
                    <i class="fa-solid fa-circle-exclamation"></i></h6>
            </div>
        </div>
        <div class="user-component__More">
            <i class="fa-regular fa-note-sticky"></i>
        </div>
    </div>
    <div class="more-option">
        <div class="more-option__icons"><i class="fa-regular fa-calendar-check"></i><span>Calandar</span></div>
        <div class="more-option__icons"><i class="fa-regular fa-hard-drive"></i><span>Talk Drive</span><span class="more-option__icons-new"></span></div>
        <div class="more-option__icons"><i class="fa-regular fa-face-smile"></i><span>Emotions</span></div>
        <div class="more-option__icons"><i class="fa-solid fa-brush"></i><span>Themes</span></div>
        <div class="more-option__icons"><i class="fa-solid fa-diagram-project"></i><span>Account</span></div>
        <div class="more-option__icons"><i class="fa-regular fa-comments"></i><span>Openchat</span></div>
        <div class="more-option__icons"></div>
        <div class="more-option__icons"></div>
    </div>  
    <div class="more-suggestions">
        <div class="more-suggestions__title">
            <span>Suggestions</span>
        </div>
        <div class="more-suggestions__icons">
            <div class="more-suggestions__icons-image"><i class="fa-solid fa-question"></i><span>Kakao Story</span></div>
            <div class="more-suggestions__icons-image"><i class="fa-solid fa-question"></i><span>Kakao Friends</span></div>
            <div class="more-suggestions__icons-image"><i class="fa-solid fa-question"></i><span>Friends Gem</span></div>
            <div class="more-suggestions__icons-image"><span></span></div>
            <div class="more-suggestions__icons-image"><span></span></div>
            <div class="more-suggestions__icons-image"><span></span></div>
        </div>
    </div>


    </main>

    <!-- nav>ul>li*4>a -->
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="far fa-user fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="chats.html">
            <span class="nav__notification"></span><i class="far fa-comment fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass fa-2xl"></i></a></li>
        <li class="nav__btn"><a class="nav__link" href="more.html">
            <span class="nav__new"></span><i class="fas fa-ellipsis fa-2xl"></i></a></li>
      </ul>
    </nav>

    <script
      src="https://kit.fontawesome.com/2f67cf591d.js"
      crossorigin="anonymous"
    ></script>
    <!-- Script should be put in the last of the body  -->
  </body>
</html>
